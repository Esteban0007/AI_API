{% extends "base.html" %} {% block title %}Simulator - SemanticSearch{% endblock
%} {% block content %}
<div class="container">
  <h1>🎬 Search Simulator</h1>
  <p>Try semantic search in real-time with 1958 TMDB movies.</p>

  <div style="margin: 2rem 0">
    <label for="search-query">Search movies (in Spanish or English):</label>
    <div class="search-box">
      <input
        type="text"
        id="search-query"
        name="query"
        placeholder="E.g: 'superhero saves the world', 'intelligent robot', 'heist'"
        hx-post="/search-partial"
        hx-trigger="keyup changed delay:500ms, search"
        hx-target="#results"
        autocomplete="off"
      />
      <span class="htmx-indicator loading">Searching...</span>
    </div>
  </div>

  <div id="results" style="margin-top: 2rem">
    <p style="color: var(--muted-color); text-align: center">
      Type to see results...
    </p>
  </div>
</div>
{% endblock %}
