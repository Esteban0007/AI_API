{% extends "base.html" %} {% block title %}Reset Password - SemanticSearch{%
endblock %} {% block content %}
<div class="container">
  <div style="max-width: 600px; margin: 4rem auto">
    <h1>Reset Password</h1>
    <p style="color: var(--muted-color)">Enter your new password below.</p>

    {% if error %}
    <article
      style="
        background-color: #ffebee;
        border-color: #f44336;
        color: #c62828;
        margin-bottom: 2rem;
      "
    >
      <strong>Error:</strong> {{ error }}
    </article>
    {% endif %}

    <form method="post" action="/reset-password/{{ token }}">
      <label for="password">
        New Password
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Minimum 8 characters"
          required
          minlength="8"
        />
      </label>

      <label for="password2">
        Confirm Password
        <input
          type="password"
          id="password2"
          name="password2"
          placeholder="Repeat the password"
          required
          minlength="8"
        />
      </label>

      <button type="submit">Reset Password</button>
    </form>

    <p style="text-align: center; margin-top: 2rem; color: var(--muted-color)">
      <a href="/login">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
